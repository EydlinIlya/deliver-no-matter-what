name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay (0-120s)
        run: sleep $((RANDOM % 120))

      - name: Ping health endpoint
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL not set, skipping"
            exit 0
          fi
          curl -sf "${RENDER_URL}/health" -o /dev/null && echo "OK" || echo "Service waking up"
