name: Keep Render Alive

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay (0-120s)
        run: sleep $((RANDOM % 120))

      - name: Ping health endpoint
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL not set, skipping"
            exit 0
          fi
          echo "Pinging ${RENDER_URL}/health"
          curl -sSL --retry 2 --retry-delay 5 --max-time 30 "${RENDER_URL}/health" || echo "Service may be waking up"
