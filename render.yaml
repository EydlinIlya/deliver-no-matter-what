services:
  - type: web
    name: shelter-badge
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # Supabase PostgreSQL connection string
      - key: SUPABASE_URL
        sync: false  # e.g. https://xxxxx.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false  # Supabase anon/public key
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /tmp/data
