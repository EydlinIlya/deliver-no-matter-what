<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — ShelterStatus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #131313;
    color: #e5e2e1;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    background: #131313;
  }
  .topbar-brand {
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: -0.03em;
  }
  .topbar-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .topbar-user img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
  }
  .topbar-name {
    font-size: 0.8rem;
    font-weight: 700;
  }
  .btn-logout {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #e01e37;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }
  .btn-logout:hover { color: #ffb3b1; }

  /* ── Main Content ───────────────────────────────── */
  .content {
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }

  .page-title {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 0.75rem;
  }
  .page-title span { color: #e01e37; }

  .page-subtitle {
    font-size: 1rem;
    color: #c5c7c8;
    margin-bottom: 3rem;
    max-width: 600px;
  }

  /* ── Create Badge Section ───────────────────────── */
  .create-section {
    background: #1c1b1b;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 3rem;
    position: relative;
  }
  .create-glow {
    position: absolute;
    top: 0;
    right: 0;
    width: 128px;
    height: 128px;
    background: rgba(224, 30, 55, 0.05);
    border-radius: 50%;
    filter: blur(48px);
    pointer-events: none;
  }
  .create-inner {
    position: relative;
    z-index: 1;
  }
  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title-icon {
    width: 24px;
    height: 24px;
    background: #e01e37;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 900;
    color: #fff;
  }
  .create-form {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: end;
  }
  .form-group { position: relative; }
  .form-group label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #9a9b9c;
    margin-bottom: 0.5rem;
    padding-left: 0.25rem;
  }
  .form-group input {
    width: 100%;
    background: #0e0e0e;
    border: none;
    color: #e5e2e1;
    padding: 1rem 1rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: box-shadow 0.2s;
  }
  .form-group input:focus {
    box-shadow: 0 0 0 2px rgba(224, 30, 55, 0.4);
  }
  .form-group input::placeholder { color: rgba(197, 199, 200, 0.3); }

  .btn-create {
    background: #e01e37;
    color: #fff;
    border: none;
    padding: 1rem 2rem;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-create:hover { filter: brightness(1.1); }
  .btn-create:active { transform: scale(0.97); }

  /* ── Autocomplete Dropdown ──────────────────────── */
  .ac-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    margin-top: 0.5rem;
    background: rgba(53, 53, 52, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-height: 280px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    padding: 0.375rem;
  }
  .ac-dropdown.visible { display: block; }
  .ac-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 1rem;
  }
  .ac-item:hover { background: rgba(224, 30, 55, 0.1); }
  .ac-item-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: #e5e2e1;
  }
  .ac-item-alt {
    font-size: 0.75rem;
    color: #9a9b9c;
    text-align: right;
    flex-shrink: 0;
  }
  .ac-empty {
    padding: 1rem;
    text-align: center;
    font-size: 0.85rem;
    color: #9a9b9c;
  }

  /* ── Badges Section ─────────────────────────────── */
  .badges-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 1.5rem;
  }
  .badges-header h2 {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .badge-card {
    background: #1c1b1b;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.25rem;
    transition: background 0.2s;
  }
  .badge-card:hover { background: #201f1f; }

  .badge-card-preview {
    margin-bottom: 1.25rem;
  }
  .badge-card-preview img {
    width: 100%;
    max-width: 600px;
    height: auto;
    border-radius: 4px;
  }

  .badge-card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .badge-card-area {
    font-size: 1.25rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .embed-group {
    flex: 1;
    min-width: 200px;
  }
  .embed-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #9a9b9c;
    margin-bottom: 0.35rem;
  }
  .embed-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .embed-code {
    flex: 1;
    background: #0e0e0e;
    padding: 0.6rem 0.75rem;
    border-radius: 6px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.7rem;
    color: #ffb3b1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: text;
    border: none;
    outline: none;
    width: 100%;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    color: #9a9b9c;
    flex-shrink: 0;
  }
  .btn-icon:hover {
    background: #353534;
    color: #e5e2e1;
  }
  .btn-icon.copied {
    background: rgba(224, 30, 55, 0.15);
    color: #e01e37;
  }
  .btn-icon svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }
  .btn-delete:hover {
    background: rgba(224, 30, 55, 0.1);
    color: #e01e37;
  }

  .empty-state {
    background: #1c1b1b;
    border-radius: 12px;
    padding: 3rem;
    text-align: center;
    color: #9a9b9c;
    font-size: 0.95rem;
  }

  /* ── Meta ────────────────────────────────────────── */
  .meta {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #9a9b9c;
    margin-top: 2rem;
    padding-top: 2rem;
  }

  /* ── Scrollbar ──────────────────────────────────── */
  .ac-dropdown::-webkit-scrollbar { width: 6px; }
  .ac-dropdown::-webkit-scrollbar-track { background: transparent; }
  .ac-dropdown::-webkit-scrollbar-thumb { background: #353534; border-radius: 3px; }

  /* ── Mobile ─────────────────────────────────────── */
  @media (max-width: 640px) {
    .create-form {
      grid-template-columns: 1fr;
    }
    .badge-card-meta {
      flex-direction: column;
      align-items: flex-start;
    }
    .embed-group { width: 100%; }
  }
</style>
</head>
<body>

<!-- ── TopBar ──────────────────────────────────────── -->
<header class="topbar">
  <span class="topbar-brand">ShelterStatus</span>
  <div class="topbar-user">
    <div style="text-align: right;">
      <div class="topbar-name">{{username}}</div>
      <form method="post" action="/auth/logout" style="display:inline;">
        <button type="submit" class="btn-logout">Log out</button>
      </form>
    </div>
    <img src="{{avatar}}" alt="avatar"/>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────── -->
<main class="content">

  <h1 class="page-title">Your <span>Badges</span></h1>
  <p class="page-subtitle">Pick your area and get a unique badge URL to embed in your profile README or anywhere else.</p>

  <!-- Create New Badge -->
  <div class="create-section">
    <div class="create-glow"></div>
    <div class="create-inner">
      <h2 class="section-title">
        <span class="section-title-icon">+</span>
        Create New Badge
      </h2>
      <form method="post" action="/api/badges" class="create-form" id="badge-form">
        <div class="form-group" id="area-group">
          <label for="areas">Area name (any language)</label>
          <input type="text" id="areas" name="areas"
                 placeholder="Start typing: Haifa, חיפה, Хайфа..."
                 required autocomplete="off"/>
          <div class="ac-dropdown" id="ac-dropdown"></div>
        </div>
        <button type="submit" class="btn-create">Create</button>
      </form>
    </div>
  </div>

  <!-- Your Badges -->
  <div class="badges-header">
    <h2>Active Badges</h2>
  </div>

  {{badge_rows}}

  <div class="meta">
    Cache: {{record_count}} records · Last refresh: {{last_refresh}}
  </div>

</main>

<script>
(function() {
  // ── Area Autocomplete ──────────────────────────────
  const input = document.getElementById('areas');
  const dropdown = document.getElementById('ac-dropdown');
  let areas = [];
  let debounceTimer;

  fetch('/api/areas')
    .then(r => r.json())
    .then(data => { areas = data; })
    .catch(() => {});

  function renderDropdown(matches) {
    if (!matches.length) {
      dropdown.innerHTML = '<div class="ac-empty">No areas found</div>';
      dropdown.classList.add('visible');
      return;
    }
    dropdown.innerHTML = matches.slice(0, 20).map(a => {
      const alts = ['en','ru','ar']
        .filter(l => a[l])
        .map(l => a[l])
        .join(' · ');
      return `<div class="ac-item" data-value="${a.he}">
        <span class="ac-item-name">${a.he}${a.en ? ' — ' + a.en : ''}</span>
        ${alts ? '<span class="ac-item-alt">' + alts + '</span>' : ''}
      </div>`;
    }).join('');
    dropdown.classList.add('visible');
  }

  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const q = this.value.trim().toLowerCase();
    if (q.length < 2) {
      dropdown.classList.remove('visible');
      return;
    }
    debounceTimer = setTimeout(() => {
      const matches = areas.filter(a => {
        return a.he.toLowerCase().includes(q)
          || (a.en && a.en.toLowerCase().includes(q))
          || (a.ru && a.ru.toLowerCase().includes(q))
          || (a.ar && a.ar.toLowerCase().includes(q));
      });
      renderDropdown(matches);
    }, 150);
  });

  dropdown.addEventListener('click', function(e) {
    const item = e.target.closest('.ac-item');
    if (item) {
      input.value = item.dataset.value;
      dropdown.classList.remove('visible');
    }
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('#area-group')) {
      dropdown.classList.remove('visible');
    }
  });

  // ── Copy Buttons ───────────────────────────────────
  document.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', function() {
      const input = this.closest('.embed-row').querySelector('.embed-code');
      navigator.clipboard.writeText(input.value).then(() => {
        this.classList.add('copied');
        this.querySelector('.icon-copy').style.display = 'none';
        this.querySelector('.icon-check').style.display = 'block';
        setTimeout(() => {
          this.classList.remove('copied');
          this.querySelector('.icon-copy').style.display = 'block';
          this.querySelector('.icon-check').style.display = 'none';
        }, 2000);
      });
    });
  });
})();
</script>

</body>
</html>
